      function destroyReservation(reservation_id) {
        if (confirm('정말로 취소하시겠습니까?')) {
          $.ajax({
            type: 'POST',
            url: './ajaxCancelReservation.htm',
            data: {
              reservation_id: reservation_id,
            },
            success: function (res) {
              if (res == 'SUCCESS') {
                alert('취소되었습니다.')
                location.href = './mypage.htm?key=&projectSeq=&addedInfo=&tozApplyType='
              } else if (res == 'FAILED') {
                alert('취소하지 못했습니다.')
              } else {
                alert('취소되었습니다.')
                location.href = res
              }
            },
            error: function (res) {
              alert('취소하지 못했습니다..')
            },
          })
        }
      }

      function goOPage(page) {
        //location.href = "./mypage.htm?key=&projectSeq=&addedInfo=&tozApplyType=&opage=" + page;
        var form = document.searchForm
        form.opage.value = page
        form.submit()
      }
      function goRPage(page) {
        //location.href = "./mypage.htm?key=&projectSeq=&addedInfo=&tozApplyType=&rpage=" + page;
        var form = document.searchForm
        form.rpage.value = page
        form.submit()
      }
      function rSearching() {
        var form = document.searchForm
        form.rpage.value = 1
        return true
      }
      function searchFormReset() {
        var form = document.searchForm
        form.startdate.value = ''
        form.enddate.value = ''
        form.meetingName.value = ''
